# Если в целом не ставится, придётся
# прописать зеркало с хуёкера (да, буквально хуёкер)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432" # Если падает с ошибкой занятого порта - МЕНЯЙ ТО ЧТО ДО ДВОЕТОЧИЯ
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: